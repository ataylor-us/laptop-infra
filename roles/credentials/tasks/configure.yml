---
- name: Create gnupg directory
  ansible.builtin.file:
    group: "{{ group }}"
    mode: "0700"
    owner: "{{ username }}"
    path: "~/.gnupg"
    state: directory
- name: Configure gpg.conf
  ansible.builtin.lineinfile:
    path: "~/.gnupg/gpg.conf"
    line: "use-agent"
    mode: "0600"
    create: true
    state: present
- name: Configure gpg-agent.conf
  ansible.builtin.lineinfile:
    path: "~/.gnupg/gpg-agent.conf"
    line: "pinentry-program /opt/homebrew/bin/pinentry-mac"
    mode: "0600"
    create: true
    state: present
