---
- name: Install pipx
  community.general.homebrew:
    name: pipx
    state: present
- name: Install package using pipx
  become: false
  community.general.pipx:
    name: "{{ item.name }}"
    install_deps: true
    state: install
    executable: /opt/homebrew/bin/pipx
  loop: "{{ pipx_packages }}"
- name: Inject packages into pipx environment
  when: item.inject is defined
  become: false
  community.general.pipx:
    name: "{{ item.name }}"
    state: inject
    inject_packages: "{{ item.inject }}"
    executable: /opt/homebrew/bin/pipx
  loop: "{{ pipx_packages }}"
